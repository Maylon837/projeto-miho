<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Controle de Produtos</h1>
        <div class="header-buttons">
            <button onclick="mostrarHome()" class="btn-header">🏠 Início</button>
            <button onclick="mostrarCadastro()" class="btn-header"> Cadastrar</button>
            <button onclick="mostrarLista()" class="btn-header">📋 Produtos</button>
        </div>
    </header>

    <!-- TELA INICIAL -->
    <div id="home-screen" class="screen active">
        <div class="menu-container">
            <br>
            <br>
            <br>
            <h2>Bem-vindo ao Sistema</h2>
            <p class="subtitle">Gerencie seu inventário com facilidade</p>
            
            <div class="main-buttons">
                <button onclick="mostrarCadastro()" class="btn-main cadastrar">
                    <span class="icon">➕</span>
                    Cadastrar Novo Produto
                </button>
                <button onclick="mostrarLista()" class="btn-main lista">
                    <span class="icon">📋</span>
                    Ver Produtos Cadastrados
                </button>
            </div>
        </div>
    </div>

    <!-- TELA DE CADASTRO -->
    <div id="cadastro-screen" class="screen">
        <div class="card">
            <h2>Cadastrar Novo Produto</h2>
            <form id="produto-form">
                <input type="hidden" id="produto-id">
                <input type="text" id="nome" placeholder="Nome do Produto" required>
                <input type="number" id="preco" placeholder="Preço (R$)" step="0.01" required>
                <input type="number" id="quantidade" placeholder="Quantidade em Estoque" required>
                <button type="submit" id="btn-salvar">Salvar Produto</button>
            </form>
        </div>
    </div>

    <!-- TELA DE LISTA -->
    <div id="lista-screen" class="screen">
        <div class="card">
            <h2>Produtos Cadastrados</h2>
            <table id="produtos-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Preço</th>
                        <th>Qtd.</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="produtos-lista"></tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
